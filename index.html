<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>glitch segmentation • toggle camera</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.10/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: black;
      overflow: hidden;
    }

    /* loading overlay */
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
      z-index: 200;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    .loading-text {
      color: cyan;
      font-size: 1.8rem;
      text-align: center;
      font-family: monospace;
    }

    .loading-text small {
      font-size: 1rem;
      opacity: 0.8;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(0, 255, 255, 0.2);
      border-top: 4px solid cyan;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* control panel (single button) */
    .controls {
      position: fixed;
      bottom: 24px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    .controls.visible {
      opacity: 1;
      pointer-events: auto;
    }

    button {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid cyan;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      padding: 10px 28px;
      border-radius: 60px;
      cursor: pointer;
      font-family: monospace;
      letter-spacing: 1px;
    }

    button:active {
      transform: scale(0.94);
      background: cyan;
      color: black;
    }

    @media (max-width: 600px) {
      button {
        padding: 8px 20px;
        font-size: 0.85rem;
      }

      .controls {
        bottom: 16px;
      }

      .loading-text {
        font-size: 1.4rem;
      }
    }
  </style>
</head>

<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">
      加载中...<br>
      <small>Loading...</small>
    </div>
  </div>
  <div class="controls" id="controls">
    <button id="toggleCamBtn">📱 FRONT</button>
  </div>

  <script>
    let bodySegmentation;
    let capture;           // our video capture
    let segmentation;
    let currentFacing = "user";   // 'user' = front, 'environment' = back
    let firstResultReceived = false;
    let hideTimeout;
    let isSwitching = false;      // prevent multiple toggles at once

    const options = { maskType: "person" };

    // preload ml5 model
    function preload() {
      bodySegmentation = ml5.bodySegmentation("SelfieSegmentation", options);
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      pixelDensity(1);

      // Create capture with explicit NO audio – this solves microphone prompt
      capture = createCapture({ audio: false, video: true });
      capture.size(width, height);
      capture.hide();

      // Start segmentation detection
      bodySegmentation.detectStart(capture, gotResults);

      // Toggle button: switch between front and back cameras
      const toggleBtn = select("#toggleCamBtn");
      toggleBtn.mousePressed(() => {
        if (isSwitching) return;
        const newFacing = currentFacing === "user" ? "environment" : "user";
        switchCamera(newFacing);
        toggleBtn.html(newFacing === "user" ? "📱 FRONT" : "📷 BACK");
      });

      // Show controls on touch/mouse move, auto-hide after 2 seconds
      function showControls() {
        const ctrl = select("#controls");
        ctrl.addClass("visible");
        if (hideTimeout) clearTimeout(hideTimeout);
        hideTimeout = setTimeout(() => {
          ctrl.removeClass("visible");
        }, 2000);
      }
      window.addEventListener("touchstart", showControls);
      window.addEventListener("mousemove", showControls);
      showControls(); // show briefly at start
    }

    // Switch camera without recreating the capture element (to keep ml5 detection running)
    async function switchCamera(facingMode) {
      if (facingMode === currentFacing) return;
      isSwitching = true;

      // Show loading overlay again
      const overlay = document.getElementById("loading-overlay");
      overlay.style.display = "flex";
      overlay.style.opacity = "1";
      firstResultReceived = false;
      segmentation = null;

      // Stop current tracks
      if (capture && capture.elt && capture.elt.srcObject) {
        capture.elt.srcObject.getTracks().forEach(track => track.stop());
      }

      // Build constraints: try exact first, fallback to ideal
      let constraints = {
        video: { facingMode: { exact: facingMode } },
        audio: false
      };

      try {
        let stream = await navigator.mediaDevices.getUserMedia(constraints);
        // Ensure no audio tracks remain (extra safety)
        stream.getAudioTracks().forEach(track => {
          track.stop();
          stream.removeTrack(track);
        });
        capture.elt.srcObject = stream;
        await capture.elt.play();
        currentFacing = facingMode;
      } catch (err) {
        console.warn("Exact facingMode failed, trying ideal", err);
        // Fallback: ideal constraint
        constraints = {
          video: { facingMode: { ideal: facingMode } },
          audio: false
        };
        try {
          let stream = await navigator.mediaDevices.getUserMedia(constraints);
          stream.getAudioTracks().forEach(track => {
            track.stop();
            stream.removeTrack(track);
          });
          capture.elt.srcObject = stream;
          await capture.elt.play();
          currentFacing = facingMode;
        } catch (e) {
          console.error("Camera switch failed", e);
          overlay.innerHTML = '<div class="loading-text">❌ 无法切换摄像头<br><small>Camera switch failed</small></div>';
          isSwitching = false;
          return;
        }
      }

      isSwitching = false;
      // ml5 detectStart continues automatically on the same capture element
    }

    // Callback from ml5 segmentation
    function gotResults(result) {
      segmentation = result;
      if (!firstResultReceived && result) {
        firstResultReceived = true;
        const overlay = document.getElementById("loading-overlay");
        overlay.style.opacity = "0";
        setTimeout(() => {
          overlay.style.display = "none";
        }, 500);
      }
    }

    // draw – never clear canvas → glitch trail
    function draw() {
      if (!firstResultReceived) {
        // Show raw video while loading (if available)
        if (capture && capture.elt.readyState >= 2) {
          push();
          translate(width, 0);
          scale(-1, 1);
          image(capture, 0, 0, width, height);
          pop();
        }
        return;
      }

      // Apply segmentation mask and draw
      if (segmentation && capture) {
        push();
        translate(width, 0);
        scale(-1, 1);
        capture.mask(segmentation.mask);
        image(capture, 0, 0, width, height);
        pop();
      } else if (capture) {
        push();
        translate(width, 0);
        scale(-1, 1);
        image(capture, 0, 0, width, height);
        pop();
      }

      // Extra glitch effects (optional)
      if (frameCount % 60 === 0 && random(1) > 0.65) {
        blendMode(ADD);
        fill(100, 255, 100, 5);
        noStroke();
        rect(0, 0, width, height);
        blendMode(BLEND);
      }

      if (frameCount % 37 === 0 && random(1) > 0.7) {
        loadPixels();
        for (let i = 0; i < pixels.length; i += 4) {
          pixels[i] = pixels[i] + 15; // red shift
        }
        updatePixels();
      }

      if (frameCount % 23 === 0 && random() > 0.8) {
        let sliceY = floor(random(height));
        let sliceH = floor(random(8, 30));
        copy(0, sliceY, width, sliceH, floor(random(-30, 30)), sliceY, width, sliceH);
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }

    function touchStarted() {
      return false; // prevent zoom on mobile
    }
  </script>
</body>

</html>

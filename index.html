<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>glitch segmentation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.10/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: black;
      overflow: hidden;
    }

    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
      z-index: 200;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    .loading-text {
      color: cyan;
      font-size: 1.8rem;
      text-align: center;
    }

    .loading-text small {
      font-size: 1rem;
      opacity: 0.8;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(0, 255, 255, 0.2);
      border-top: 4px solid cyan;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .controls {
      position: fixed;
      bottom: 24px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 20px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .controls.visible {
      opacity: 1;
      pointer-events: auto;
    }

    button {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid cyan;
      color: white;
      font-size: 1rem;
      padding: 10px 28px;
      border-radius: 60px;
      cursor: pointer;
      font-family: monospace;
    }

    button:active {
      transform: scale(0.94);
      background: cyan;
      color: black;
    }

    @media (max-width: 600px) {
      button {
        padding: 8px 20px;
        font-size: 0.85rem;
      }

      .controls {
        gap: 16px;
        bottom: 16px;
      }

      .loading-text {
        font-size: 1.4rem;
      }
    }
  </style>
</head>

<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">加载中...<br><small>Loading...</small></div>
  </div>
  <div class="controls" id="controls">
    <button id="frontBtn">📱 FRONT</button>
    <button id="backBtn">📷 BACK</button>
  </div>

  <script>
    let bodySegmentation;
    let video;
    let segmentation;
    let currentFacing = "user";
    let hideTimeout;
    let firstResultReceived = false;
    let currentDetectionToken = 0;   // to ignore stale results

    const options = { maskType: "person" };

    function preload() {
      bodySegmentation = ml5.bodySegmentation("SelfieSegmentation", options);
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      pixelDensity(1);
      initCamera("user");

      select("#frontBtn").mousePressed(() => switchCamera("user"));
      select("#backBtn").mousePressed(() => switchCamera("environment"));

      function showControls() {
        const ctrl = select("#controls");
        ctrl.addClass("visible");
        if (hideTimeout) clearTimeout(hideTimeout);
        hideTimeout = setTimeout(() => ctrl.removeClass("visible"), 2000);
      }
      window.addEventListener("touchstart", showControls);
      window.addEventListener("mousemove", showControls);
      showControls();
    }

    async function initCamera(facingMode) {
      // stop previous stream tracks
      if (video && video.elt && video.elt.srcObject) {
        let tracks = video.elt.srcObject.getTracks();
        tracks.forEach(track => track.stop());
      }

      const constraints = {
        video: { facingMode: { ideal: facingMode } },
        audio: false
      };

      try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);

        // 🔥 FIX MIC PROMPT: forcefully remove any audio tracks
        stream.getAudioTracks().forEach(track => {
          track.stop();
          stream.removeTrack(track);
        });

        if (video) video.remove();
        video = createCapture(stream);
        video.size(width, height);
        video.hide();

        // increment token so old detection results are ignored
        currentDetectionToken++;
        const thisToken = currentDetectionToken;

        // reset segmentation flag
        segmentation = null;
        firstResultReceived = false;

        // restart detection with new video
        bodySegmentation.detectStart(video, (result) => {
          // only accept result if it's from the current camera
          if (thisToken === currentDetectionToken) {
            segmentation = result;
            if (!firstResultReceived) {
              firstResultReceived = true;
              const overlay = document.getElementById("loading-overlay");
              overlay.style.opacity = "0";
              setTimeout(() => { overlay.style.display = "none"; }, 500);
            }
          }
        });

        currentFacing = facingMode;
      } catch (err) {
        console.warn("Camera error:", err);
        // fallback: default camera
        try {
          const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
          fallbackStream.getAudioTracks().forEach(t => { t.stop(); fallbackStream.removeTrack(t); });
          if (video) video.remove();
          video = createCapture(fallbackStream);
          video.size(width, height);
          video.hide();
          currentDetectionToken++;
          const thisToken = currentDetectionToken;
          bodySegmentation.detectStart(video, (result) => {
            if (thisToken === currentDetectionToken) {
              segmentation = result;
              if (!firstResultReceived) {
                firstResultReceived = true;
                const overlay = document.getElementById("loading-overlay");
                overlay.style.opacity = "0";
                setTimeout(() => { overlay.style.display = "none"; }, 500);
              }
            }
          });
        } catch (e) {
          document.getElementById("loading-overlay").innerHTML = '<div class="loading-text">❌ 无法访问摄像头<br><small>Camera access denied</small></div>';
        }
      }
    }

    function switchCamera(facingMode) {
      if (facingMode === currentFacing) return;
      initCamera(facingMode);
      // show loading overlay again
      const overlay = document.getElementById("loading-overlay");
      overlay.style.display = "flex";
      overlay.style.opacity = "1";
      firstResultReceived = false;
    }

    function draw() {
      if (!firstResultReceived) {
        // optional: show raw video while loading
        if (video) {
          push(); translate(width, 0); scale(-1, 1); image(video, 0, 0, width, height); pop();
        }
        return;
      }

      if (segmentation && video) {
        push(); translate(width, 0); scale(-1, 1); video.mask(segmentation.mask); image(video, 0, 0, width, height); pop();
      } else if (video) {
        push(); translate(width, 0); scale(-1, 1); image(video, 0, 0, width, height); pop();
      }

      // glitch effects
      if (frameCount % 60 === 0 && random(1) > 0.65) {
        blendMode(ADD); fill(100, 255, 100, 5); noStroke(); rect(0, 0, width, height); blendMode(BLEND);
      }
      if (frameCount % 37 === 0 && random(1) > 0.7) {
        loadPixels();
        for (let i = 0; i < pixels.length; i += 4) pixels[i] = pixels[i] + 15;
        updatePixels();
      }
      if (frameCount % 23 === 0 && random() > 0.8) {
        let sliceY = floor(random(height));
        let sliceH = floor(random(8, 30));
        copy(0, sliceY, width, sliceH, floor(random(-30, 30)), sliceY, width, sliceH);
      }
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
    function touchStarted() { return false; }
  </script>
</body>

</html>
